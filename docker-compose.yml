services:
  grist:
    image: gristlabs/grist:latest
    container_name: grist
    ports:
      - "7531:8484"
    environment:
      GRIST_SESSION_SECRET: change-me-for-local-dev
      GRIST_SINGLE_ORG: local
    volumes:
      - grist_data:/persist
    restart: unless-stopped

volumes:
  grist_data:
