name: Builds, tests & co

on:
  - push
  - pull_request

permissions: read-all

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest
          # - windows-latest
      fail-fast: false

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.3

      - run: opam pin https://github.com/voodoos/ppx_deriving_jsont.git
      - run: opam pin https://github.com/ocsigen/js_of_ocaml.git
      - run: opam install ortools --deps-only --with-test
      - run: opam install . --deps-only --with-test

      - run: opam exec -- dune runtest

      - run: opam exec -- dune build --profile=release
