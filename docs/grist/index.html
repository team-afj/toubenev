<!DOCTYPE html>
<html>

<head>
  <title>Toubénev Grist Intégration</title>
  <!-- TODO CDN BAD -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="http://localhost:7531/grist-plugin-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.amber.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.colors.min.css">
  <style>
    .error {
      color: var(--pico-color-red-400);
      font-weight: 700;
    }

    .error::after {
      content: "⚠";
      position: absolute;
    }

    .warn {
      color: var(--pico-color-pumpkin-300);
    }

    .warn::after {
      content: "🔥";
      position: absolute;
    }

    .diag-card {
      border: 1px solid;

      &::before {
        float: left;
        font-size: 1.5rem;
        line-height: 1.5rem;
        margin-right: 1rem;
        margin-bottom: 0.5rem;
      }

      &.diag-error {
        border-color: var(--pico-color-red-450);

        &::before {
          content: '❌';
        }
      }

      &.diag-warn {
        border-color: var(--pico-color-pumpkin-300);

        &::before {
          content: '⚠️';
        }
      }

      &.diag-info {
        border-color: var(--pico-color-azure-200);

        &::before {
          content: 'ⓘ';
        }
      }
    }

    details summary {
      font-size: 125%;
      font-weight: bold;

      &::after {
        width: 1.5rem;
        background-size: 1.5rem auto;
      }
    }
  </style>
</head>

<body>
  <main>
  </main>
  <script>
    grist.ready({
      requiredAccess: 'full',
      columns: []
    });
  </script>
  <script src="index.bc.js"></script>

</body>

</html>
